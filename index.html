<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Birthday Card</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Noto+Sans+Thai:wght@300;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="viewport">
        <div id="decoration-layer" class="decoration-layer"></div>

        <div id="envelope-section">
            <div class="envelope" id="envelope">
                <div class="flap"></div>
                <div class="envelope-body"></div>
                <div class="wax-seal-container">
                    <div class="wax-seal">❤</div>
                    <span class="tap-hint">กดเพื่อเปิดซองจดหมาย</span>
                </div>
            </div>
        </div>

        <div id="birthday-section" class="hidden">
            <div class="content-wrapper">
                <h1 id="hbd-text" class="hbd-title">Happy Birthday</h1>
                
                <div class="cake-stage" id="cake-container">
                    <div class="layer layer-top">
                        <div class="candle" id="main-candle">
                            <div class="flame" id="flame"></div>
                            <div class="smoke-container" id="smoke-container">
                                <div class="smoke"></div>
                                <div class="smoke"></div>
                                <div class="smoke"></div>
                            </div>
                        </div>
                    </div>
                    <div class="layer layer-middle"></div>
                    <div class="layer layer-bottom"></div>
                </div>

                <div id="instruction-text" class="instruction">กดที่เค้กเพื่อเป่าเทียนวันเกิด</div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
